function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<span class="${cls}">${msg}</span>\n`;
  el.scrollTop=el.scrollHeight;
}

async function run(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('log').innerHTML='';
  log('DB에서 곡 목록 불러오는 중...','info');

  const res=await fetch(URL+'/rest/v1/songs?select=id,name&limit=2000',{headers:RH});
  const songs=await res.json();
  log(`✓ ${songs.length}곡 로드 완료\n`,'ok');

  // 곡명 → id 맵
  const nameMap={};
  songs.forEach(s=>nameMap[s.name.normalize('NFC').trim()]=s.id);

  let ok=0,skip=0,fail=0;
  const entries=Object.entries(TAGS);

  for(let i=0;i<entries.length;i++){
    const [name,tags]=entries[i];
    document.getElementById('pf').style.width=Math.round((i/entries.length)*100)+'%';
    const normName=name.normalize('NFC').trim();
    const id=nameMap[normName];
    if(!id){
      log(`⬜ 없음: "${name}"`);
      skip++;
      continue;
    }
    try{
      const r=await fetch(URL+'/rest/v1/songs?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify({seasons:tags,updated_at:new Date().toISOString()})});
      if(!r.ok)throw new Error(await r.text());
      log(`✓ ${name} → [${tags.join(', ')}]`,'ok');
      ok++;
    }catch(e){
      log(`✗ ${name}: ${e.message}`,'err');
      fail++;
    }
  }

  document.getElementById('pf').style.width='100%';
  log(`\n✅ 완료! 성공: ${ok}곡 / 없음: ${skip}곡 / 실패: ${fail}곡`,'ok');
  const sum=document.getElementById('summary');
  sum.style.display='block';
  sum.innerHTML=`✅ 태그 업데이트 완료<br>성공 <b>${ok}곡</b> · 없음 <b>${skip}곡</b> · 실패 <b>${fail}곡</b>`;
  btn.disabled=false;btn.textContent='다시 실행';
}
</script>
