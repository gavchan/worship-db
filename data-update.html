function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<span class="${cls}">${msg}</span>\n`;
  el.scrollTop=el.scrollHeight;
}

async function run(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('log').innerHTML='';
  log('DB 곡 목록 불러오는 중...','info');
  const res=await fetch(SURL+'/rest/v1/songs?select=id,name&limit=2000',{headers:RH});
  const dbSongs=await res.json();
  log(`✓ ${dbSongs.length}곡 로드 완료\n`,'ok');
  const nameMap={};
  dbSongs.forEach(s=>nameMap[s.name.normalize('NFC').trim()]=s.id);
  let ok=0,skip=0,fail=0;
  for(let i=0;i<DATA.length;i++){
    const d=DATA[i];
    document.getElementById('pf').style.width=Math.round((i/DATA.length)*100)+'%';
    const id=nameMap[d.name.normalize('NFC').trim()];
    if(!id){log(`⬜ 없음: ${d.name}`);skip++;continue;}
    try{
      const body={updated_at:new Date().toISOString()};
      if(d.bpm>0) body.bpm=d.bpm;
      if(d.key) body.key=d.key;
      if(d.seasons.length) body.seasons=d.seasons;
      if(d.music_url) body.music_url=d.music_url;
      const r=await fetch(SURL+'/rest/v1/songs?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(body)});
      if(!r.ok)throw new Error(await r.text());
      const hasLink=d.music_url?'▶':'  ';
      log(`✓ ${hasLink} ${d.name} | ${d.key||'-'} | ${d.bpm||'-'}BPM`,'ok');
      ok++;
    }catch(e){log(`✗ ${d.name}: ${e.message}`,'err');fail++;}
  }
  document.getElementById('pf').style.width='100%';
  log(`\n✅ 완료! 성공: ${ok} / 없음: ${skip} / 실패: ${fail}`,'ok');
  const sum=document.getElementById('summary');
  sum.style.display='block';
  sum.innerHTML=`✅ 완료 — 성공 <b>${ok}곡</b> · 없음 <b>${skip}곡</b> · 실패 <b>${fail}곡</b>`;
  btn.disabled=false;btn.textContent='다시 실행';
}
</script>
