<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="찬양DB">
<title>찬양곡 데이터베이스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--surface:#fff;--surface2:#f4f1eb;--border:#e8e2d9;--border2:#d4cec4;--text1:#1a1714;--text2:#6b6560;--text3:#9e9891;--accent:#2d5a8e;--accent2:#c4913a;--green:#3a7a52;--green-bg:#edf5f0;--blue-bg:#eaf0f8;--amber-bg:#fdf4e7;--red:#b0281f;--red-bg:#fdeaea}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh}

.header{background:var(--text1);color:#fff;padding:1.75rem 1.5rem 1.4rem;position:relative;overflow:hidden}
.header::before{content:'♪';position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);font-size:6rem;opacity:.05;font-family:serif}
.header h1{font-family:'Noto Serif KR',serif;font-size:1.4rem;font-weight:700;margin-bottom:.2rem}
.header p{font-size:.73rem;color:rgba(255,255,255,.45);letter-spacing:.04em}
.sync-status{font-size:.68rem;margin-top:.4rem;display:flex;align-items:center;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:#4caf50;display:inline-block}
.dot.off{background:#888}
.dot.sync{background:#f59e0b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:1px solid var(--border)}
.si{padding:.85rem .4rem;text-align:center;border-right:1px solid var(--border)}
.si:last-child{border-right:none}
.sn{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:700;color:var(--accent);display:block}
.sl{font-size:.63rem;color:var(--text3);margin-top:2px;line-height:1.3}

.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1rem;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.sw{position:relative;margin-bottom:.6rem}
.sw input{width:100%;padding:.55rem .8rem .55rem 2rem;border:1px solid var(--border2);border-radius:6px;background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;color:var(--text1);outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--accent)}
.si-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.8rem;pointer-events:none}
.fr{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:.7rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cb{font-size:.68rem;color:var(--text3);margin-top:.4rem}
.sort-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:.5rem;align-items:center}
.sort-label{font-size:.68rem;color:var(--text3);white-space:nowrap}
.sb{padding:4px 11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:.7rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:3px}
.sb:hover{border-color:var(--accent2);color:var(--accent2)}
.sb.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.add-fab{position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.5rem;cursor:pointer;z-index:100;box-shadow:0 4px 16px rgba(45,90,142,.4);transition:transform .15s;display:flex;align-items:center;justify-content:center}
.add-fab:hover{transform:scale(1.08)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:420px;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:700;margin-bottom:1.2rem}
.form-group{margin-bottom:.9rem}
.form-group label{display:block;font-size:.72rem;font-weight:500;color:var(--text2);margin-bottom:.35rem}
.form-group input,.form-group select{width:100%;padding:.55rem .75rem;border:1px solid var(--border2);border-radius:6px;background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:.83rem;color:var(--text1);outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.check-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.check-group label{font-size:.75rem;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text2)}
.modal-row{display:flex;gap:8px;margin-top:1.2rem}
.btn-cancel{flex:1;padding:.6rem;border:1px solid var(--border2);border-radius:6px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:.8rem;color:var(--text2);cursor:pointer}
.btn-save{flex:2;padding:.6rem;border:none;border-radius:6px;background:var(--accent);font-family:'Noto Sans KR',sans-serif;font-size:.8rem;color:#fff;cursor:pointer;font-weight:500}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

.list{padding:.75rem;display:flex;flex-direction:column;gap:5px;padding-bottom:5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card.open{border-color:var(--accent)}
.card.new-card{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ch{display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;user-select:none}
.badge{font-size:.63rem;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.b-used{background:var(--blue-bg);color:var(--accent)}
.b-ready{background:var(--green-bg);color:var(--green)}
.b-plan{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.sn2{font-size:.88rem;font-weight:500;flex:1}
.top-s{font-size:.62rem;color:var(--accent2);font-weight:700}
.chev{font-size:.65rem;color:var(--text3);flex-shrink:0}
.cd{display:none;padding:0 13px 12px;border-top:1px solid var(--border)}
.card.open .cd{display:block}
.di{padding-top:9px;display:flex;flex-direction:column;gap:8px}
.ib{background:var(--surface2);border-radius:6px;padding:7px 10px}
.il{font-size:.62rem;color:var(--text3);font-weight:700;letter-spacing:.07em;margin-bottom:3px;text-transform:uppercase}
.it{font-size:.78rem;color:var(--text1);line-height:1.6}
.bt{display:flex;align-items:center;gap:7px;margin-top:4px}
.bt-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.bt-fill{height:100%;background:var(--accent);border-radius:2px}
.bt-num{font-size:.68rem;color:var(--text2);min-width:30px}
.stags{display:flex;gap:4px;flex-wrap:wrap}
.stag{font-size:.62rem;padding:2px 7px;border-radius:20px;background:var(--amber-bg);color:var(--accent2);border:1px solid rgba(196,145,58,.2)}
.ar{display:flex;gap:5px;flex-wrap:wrap}
.ab{flex:1;min-width:70px;padding:6px 8px;border:1px solid var(--border2);border-radius:6px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:.68rem;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center;white-space:nowrap}
.ab:hover{background:var(--blue-bg);color:var(--accent);border-color:var(--accent)}
.ab.green:hover{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.ab.red:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.ab.amber{border-color:rgba(196,145,58,.4);color:var(--accent2);background:var(--amber-bg)}
.ab.amber:hover{background:#f5e0b0}

.loading{text-align:center;padding:3rem 1rem;color:var(--text3)}
.loading-spin{font-size:1.5rem;display:block;margin-bottom:.5rem;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nr{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:.85rem}
.nr span{display:block;font-size:2rem;margin-bottom:.5rem}

.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text1);color:#fff;padding:.6rem 1.2rem;border-radius:20px;font-size:.78rem;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer{padding:1rem;text-align:center;border-top:1px solid var(--border);background:var(--surface);margin-top:.5rem}
.fn{font-size:.66rem;color:var(--text3);line-height:1.7}
</style>
</head>
<body>

<div class="header">
  <h1>찬양곡 데이터베이스</h1>
  <p>기독교대한감리회 · 찬양인도자 전용</p>
  <div class="sync-status">
    <span class="dot" id="dot"></span>
    <span id="sync-txt">연결 중...</span>
  </div>
</div>

<div class="stats">
  <div class="si"><span class="sn" id="st-used">-</span><div class="sl">사용 이력</div></div>
  <div class="si"><span class="sn" id="st-ready">-</span><div class="sl">악보 완료</div></div>
  <div class="si"><span class="sn" id="st-total">-</span><div class="sl">전체</div></div>
  <div class="si"><span class="sn" id="st-top">-</span><div class="sl">최다 사용</div></div>
</div>

<div class="controls">
  <div class="sw">
    <span class="si-icon">🔍</span>
    <input type="text" id="q" placeholder="곡명으로 검색..." oninput="render()">
  </div>
  <div class="fr">
    <button class="fb on" onclick="sf('all',this)">전체</button>
    <button class="fb" onclick="sf('used',this)">사용 이력</button>
    <button class="fb" onclick="sf('ready',this)">악보 완료</button>
    <button class="fb" onclick="sf('top',this)">⭐ TOP 10</button>
    <button class="fb" onclick="sf('xmas',this)">성탄절</button>
    <button class="fb" onclick="sf('위로',this)">위로</button>
    <button class="fb" onclick="sf('감사',this)">감사</button>
    <button class="fb" onclick="sf('부활',this)">부활절</button>
    <button class="fb" onclick="sf('사순',this)">사순절</button>
  </div>
  <div class="sort-row">
    <span class="sort-label">정렬:</span>
    <button class="sb on" onclick="ss('name',this)">가나다 ↕</button>
    <button class="sb" onclick="ss('status',this)">상태별</button>
    <button class="sb" onclick="ss('count',this)">사용 많은 순</button>
    <button class="sb" onclick="ss('key',this)">키(코드)별</button>
    <button class="sb" onclick="ss('bpm',this)">템포순</button>
  </div>
  <div class="cb" id="cnt"></div>
</div>

<div class="list" id="list"><div class="loading"><span class="loading-spin">⟳</span>데이터 불러오는 중...</div></div>

<div class="footer">
  <div class="fn">Supabase 클라우드 동기화 · 모든 기기에서 실시간 반영<br>2003–2026년 예배 사용 이력 기반</div>
</div>

<button class="add-fab" onclick="openModal()" title="곡 추가">＋</button>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">새 곡 추가</h2>
    <div class="form-group">
      <label>곡명 *</label>
      <input type="text" id="f-name" placeholder="예: 주님의 은혜로">
    </div>
    <div class="form-group">
      <label>상태</label>
      <select id="f-status" onchange="toggleCntField()">
        <option value="used">사용 이력 있음</option>
        <option value="ready">악보 완료</option>
        <option value="plan">작업 예정</option>
      </select>
    </div>
    <div class="form-group" id="f-cnt-wrap">
      <label>사용 횟수</label>
      <input type="number" id="f-cnt" min="1" value="1">
    </div>
    <div style="display:flex;gap:8px">
      <div class="form-group" style="flex:1">
        <label>키 (코드)</label>
        <select id="f-key">
          <option value="">미정</option>
          <option>C</option><option>C#</option><option>D</option><option>D#</option>
          <option>E</option><option>F</option><option>F#</option><option>G</option>
          <option>G#</option><option>A</option><option>A#</option><option>Bb</option><option>B</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label>템포 (BPM)</label>
        <input type="number" id="f-bpm" min="0" max="300" value="0" placeholder="예: 76">
      </div>
    </div>
    <div class="form-group">
      <label>절기 태그</label>
      <div class="check-group">
        <label><input type="checkbox" value="위로"> 위로</label>
        <label><input type="checkbox" value="감사"> 감사</label>
        <label><input type="checkbox" value="부활절"> 부활절</label>
        <label><input type="checkbox" value="사순절"> 사순절</label>
        <label><input type="checkbox" value="성탄절"> 성탄절</label>
        <label><input type="checkbox" value="대림절"> 대림절</label>
      </div>
    </div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="btn-save" onclick="saveSong()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── SUPABASE API ──────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method, headers: HEADERS, body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── INIT ──────────────────────────────────────────────────
async function init() {
  setSync('sync', '연결 중...');
  try {
    let data = await api('GET', 'songs?order=name');
    if (!data || data.length === 0) {
      // 첫 실행 — 기본 데이터 업로드
      setSync('sync', '초기 데이터 업로드 중...');
      await uploadBaseData();
      data = await api('GET', 'songs?order=name');
    }
    songs = data;
    setSync('on', '클라우드 연결됨');
    updateStats();
    render();
  } catch(e) {
    setSync('off', '연결 실패 — 인터넷 확인');
    document.getElementById('list').innerHTML = '<div class="nr"><span>⚠️</span>서버 연결에 실패했어요<br><small>인터넷 연결을 확인해주세요</small></div>';
  }
}

async function uploadBaseData() {
  const rows = [];
  const seen = new Set();
  function add(name, status, count) {
    if (seen.has(name)) return;
    seen.add(name);
    rows.push({ name, status, count: count || 0, seasons: BASE_SEASONS[name] || [] });
  }
  Object.entries(BASE_USED).forEach(([n,c]) => add(n,'used',c));
  BASE_READY.forEach(n => add(n,'ready',0));
  BASE_PLAN.forEach(n => add(n,'plan',0));
  // 50개씩 나눠서 업로드
  for (let i = 0; i < rows.length; i += 50) {
    await api('POST', 'songs', rows.slice(i, i+50));
  }
}

function setSync(state, txt) {
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state==='on' ? '' : state==='sync' ? ' sync' : ' off');
  document.getElementById('sync-txt').textContent = txt;
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  document.getElementById('st-used').textContent = songs.filter(s=>s.status==='used').length;
  document.getElementById('st-ready').textContent = songs.filter(s=>s.status==='ready').length;
  document.getElementById('st-total').textContent = songs.length;
  const top = [...songs].filter(s=>s.count>0).sort((a,b)=>b.count-a.count)[0];
  document.getElementById('st-top').textContent = top ? top.count : '-';
}

// ── FILTER ────────────────────────────────────────────────
function sf(f, btn) {
  filt = f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function ss(by, btn) {
  if (sortBy === by) { sortDir *= -1; }
  else { sortBy = by; sortDir = 1; }
  document.querySelectorAll('.sb').forEach(b=>{ b.classList.remove('on'); b.textContent = b.textContent.replace(' ▲','').replace(' ▼',''); });
  btn.classList.add('on');
  btn.textContent = btn.textContent + (sortDir===1?' ▲':' ▼');
  render();
}
function toggle(id) { exp = exp===id ? null : id; render(); }

// ── MODAL ─────────────────────────────────────────────────
function openModal(id) {
  editId = id || null;
  document.querySelectorAll('.check-group input').forEach(cb=>cb.checked=false);
  if (editId) {
    const s = songs.find(x=>x.id===editId);
    document.getElementById('modal-title').textContent = '곡 정보 수정';
    document.getElementById('f-name').value = s.name;
    document.getElementById('f-status').value = s.status;
    document.getElementById('f-cnt').value = s.count || 1;
    document.getElementById('f-key').value = s.key || '';
    document.getElementById('f-bpm').value = s.bpm || 0;
    (s.seasons||[]).forEach(t=>{ const cb=document.querySelector(`.check-group input[value="${t}"]`); if(cb)cb.checked=true; });
  } else {
    document.getElementById('modal-title').textContent = '새 곡 추가';
    document.getElementById('f-name').value = '';
    document.getElementById('f-status').value = 'used';
    document.getElementById('f-cnt').value = 1;
    document.getElementById('f-key').value = '';
    document.getElementById('f-bpm').value = 0;
  }
  toggleCntField();
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('f-name').focus(), 100);
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function toggleCntField() {
  document.getElementById('f-cnt-wrap').style.display =
    document.getElementById('f-status').value==='used' ? 'block' : 'none';
}
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

async function saveSong() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('곡명을 입력해주세요'); return; }
  const status = document.getElementById('f-status').value;
  const count = status==='used' ? (parseInt(document.getElementById('f-cnt').value)||1) : 0;
  const key = document.getElementById('f-key').value;
  const bpm = parseInt(document.getElementById('f-bpm').value) || 0;
  const seasons = [...document.querySelectorAll('.check-group input:checked')].map(cb=>cb.value);
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '저장 중...';
  setSync('sync', '저장 중...');
  try {
    if (editId) {
      const updated = await api('PATCH', `songs?id=eq.${editId}`, { name, status, count, seasons, key, bpm, updated_at: new Date().toISOString() });
      const idx = songs.findIndex(s=>s.id===editId);
      if (idx>=0) songs[idx] = updated[0];
      showToast('수정되었습니다 ✓');
    } else {
      if (songs.find(s=>s.name===name)) { showToast('이미 있는 곡이에요'); btn.disabled=false; btn.textContent='저장'; return; }
      const created = await api('POST', 'songs', { name, status, count, seasons, key, bpm });
      songs.unshift(created[0]);
      showToast('추가되었습니다 ✓');
    }
    setSync('on', '클라우드 연결됨');
    closeModal();
    updateStats();
    render();
  } catch(e) {
    showToast('저장 실패: ' + e.message);
    setSync('off', '저장 실패');
  }
  btn.disabled=false; btn.textContent='저장';
}

// ── STATUS CHANGE ─────────────────────────────────────────
async function changeStatus(id, newStatus) {
  const s = songs.find(x=>x.id===id);
  const count = newStatus==='used' ? Math.max(s.count||0,1) : 0;
  setSync('sync', '업데이트 중...');
  try {
    await api('PATCH', `songs?id=eq.${id}`, { status: newStatus, count, updated_at: new Date().toISOString() });
    s.status = newStatus; s.count = count;
    const labels = {used:'사용 이력',ready:'악보 완료',plan:'작업 예정'};
    showToast(`"${s.name}" → ${labels[newStatus]} ✓`);
    setSync('on', '클라우드 연결됨');
    updateStats(); render();
  } catch(e) { showToast('실패: '+e.message); setSync('off','업데이트 실패'); }
}

async function addUseCount(id) {
  const s = songs.find(x=>x.id===id);
  const newCount = (s.count||0) + 1;
  setSync('sync', '업데이트 중...');
  try {
    await api('PATCH', `songs?id=eq.${id}`, { status:'used', count: newCount, updated_at: new Date().toISOString() });
    s.status='used'; s.count=newCount;
    showToast(`사용 횟수 +1 (총 ${newCount}회) ✓`);
    setSync('on', '클라우드 연결됨');
    updateStats(); render();
  } catch(e) { showToast('실패: '+e.message); setSync('off','실패'); }
}

async function deleteSong(id) {
  const s = songs.find(x=>x.id===id);
  if (!confirm(`"${s.name}" 을(를) 삭제할까요?`)) return;
  setSync('sync', '삭제 중...');
  try {
    await api('DELETE', `songs?id=eq.${id}`);
    songs = songs.filter(x=>x.id!==id);
    exp = null;
    showToast('삭제되었습니다');
    setSync('on', '클라우드 연결됨');
    updateStats(); render();
  } catch(e) { showToast('실패: '+e.message); setSync('off','삭제 실패'); }
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const top10 = [...songs].filter(s=>s.count>0).sort((a,b)=>b.count-a.count).slice(0,10).map(s=>s.name);
  const mx = Math.max(...songs.map(s=>s.count), 1);

  let list = songs.filter(s=>{
    const mq = !q || s.name.toLowerCase().includes(q);
    if (!mq) return false;
    if (filt==='all') return true;
    if (filt==='used') return s.status==='used';
    if (filt==='ready') return s.status==='ready';
    if (filt==='top') return top10.includes(s.name);
    const seas = s.seasons||[];
    if (filt==='xmas') return seas.includes('성탄절');
    if (filt==='위로') return seas.includes('위로');
    if (filt==='감사') return seas.includes('감사');
    if (filt==='부활') return seas.includes('부활절');
    if (filt==='사순') return seas.includes('사순절');
    return true;
  });

  // 정렬
  const statusOrder = {used:0, ready:1, plan:2};
  list.sort((a,b)=>{
    let v = 0;
    if (sortBy==='name') v = a.name.localeCompare(b.name, 'ko');
    else if (sortBy==='status') v = (statusOrder[a.status]||0) - (statusOrder[b.status]||0);
    else if (sortBy==='count') v = (b.count||0) - (a.count||0);
    else if (sortBy==='key') v = (a.key||'zzz').localeCompare(b.key||'zzz');
    else if (sortBy==='bpm') v = (a.bpm||0) - (b.bpm||0);
    return sortBy==='count' ? v : v * sortDir;
  });
  const container = document.getElementById('list');
  if (!list.length) { container.innerHTML='<div class="nr"><span>🎵</span>검색 결과가 없습니다</div>'; return; }

  container.innerHTML = list.map(s=>{
    const isTop = top10.includes(s.name);
    const isOpen = exp===s.id;
    const bl = s.status==='used'?`사용 ${s.count}회`:s.status==='ready'?'악보 완료':'작업 예정';
    const bc = s.status==='used'?'b-used':s.status==='ready'?'b-ready':'b-plan';
    const barPct = s.count>0?Math.round((s.count/mx)*100):0;
    const seas = s.seasons||[];
    let actionBtns = '';
    if (s.status==='plan') {
      actionBtns += `<button class="ab green" onclick="changeStatus('${s.id}','ready')">악보 완료 ✓</button>`;
      actionBtns += `<button class="ab amber" onclick="changeStatus('${s.id}','used')">사용 이력 추가</button>`;
    } else if (s.status==='ready') {
      actionBtns += `<button class="ab amber" onclick="changeStatus('${s.id}','used')">사용 이력 추가</button>`;
      actionBtns += `<button class="ab" onclick="changeStatus('${s.id}','plan')">작업 예정으로</button>`;
    } else {
      actionBtns += `<button class="ab amber" onclick="addUseCount('${s.id}')">사용 횟수 +1</button>`;
      actionBtns += `<button class="ab green" onclick="changeStatus('${s.id}','ready')">악보 완료로</button>`;
    }
    actionBtns += `<button class="ab" onclick="openModal('${s.id}')">수정</button>`;
    actionBtns += `<button class="ab red" onclick="deleteSong('${s.id}')">삭제</button>`;

    return `<div class="card ${isOpen?'open':''}">
<div class="ch" onclick="toggle('${s.id}')">
  <span class="badge ${bc}">${bl}</span>
  <span class="sn2">${s.name}</span>
  ${isTop?`<span class="top-s">TOP ${top10.indexOf(s.name)+1}</span>`:''}
  <span class="chev">${isOpen?'▲':'▼'}</span>
</div>
<div class="cd"><div class="di">
  <div class="ib">
    <div class="il">사용 현황</div>
    <div class="it">${s.status==='used'?`총 ${s.count}회 사용`:s.status==='ready'?'악보 작업 완료':'악보 작업 예정 중'}</div>
    ${s.count>0?`<div class="bt"><div class="bt-track"><div class="bt-fill" style="width:${barPct}%"></div></div><span class="bt-num">${s.count}/${mx}회</span></div>`:''}
  </div>
  ${(s.key||s.bpm)?`<div style="display:flex;gap:6px;flex-wrap:wrap">${s.key?`<span class="stag" style="background:var(--blue-bg);color:var(--accent);border-color:rgba(45,90,142,.2)">🎵 키: ${s.key}</span>`:''}${s.bpm?`<span class="stag" style="background:var(--green-bg);color:var(--green);border-color:rgba(58,122,82,.2)">♩ ${s.bpm} BPM · ${s.bpm<65?'느리게':s.bpm<85?'보통':s.bpm<110?'빠르게':'매우 빠르게'}</span>`:''}</div>`:''}
  ${seas.length?`<div class="stags">${seas.map(t=>`<span class="stag">${t}</span>`).join('')}</div>`:''}
  <div class="ar">${actionBtns}</div>
</div></div></div>`;
  }).join('');
}

init();
</script>
</body>
