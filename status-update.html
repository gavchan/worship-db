function norm(s) { return s.trim().replace(/\s+/g,' '); }

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

async function api(method, path, body, minimal=false) {
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {
    method, headers: minimal?HM:H, body: body?JSON.stringify(body):undefined
  });
  if(!res.ok) throw new Error(await res.text());
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

async function startUpdate() {
  const btn = document.getElementById('btn1');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔍 기존 DB 곡 목록 불러오는 중...', 'info');

  try {
    const existing = await api('GET', 'songs?select=id,name,count,status&limit=1000');
    // 정규화된 이름으로 맵 생성 (공백 trim + 중복공백 제거)
    const existMap = {};
    existing.forEach(s => { existMap[norm(s.name)] = s; });
    log(`✓ 기존 DB: ${existing.length}곡`, 'ok');
    log('');

    let updated = 0, added = 0, failed = 0;

    for (const song of songData) {
      const rawName = song.name;
      const name = norm(rawName);
      const count = song.count;
      const status = count > 0 ? 'used' : 'ready';
      const match = existMap[name];

      if (match) {
        try {
          await api('PATCH', `songs?id=eq.${match.id}`, { count, status, updated_at: new Date().toISOString() }, true);
          log(`✓ 업데이트: ${name} (${count}회)`, 'ok');
          updated++;
        } catch(e) {
          log(`✗ 실패: ${name} — ${e.message}`, 'err');
          failed++;
        }
      } else {
        try {
          await api('POST', 'songs', { name, count, status, seasons:[], key:'', bpm:0, music_url:'' });
          log(`➕ 새로 추가: ${name} (${count}회)`, 'info');
          added++;
        } catch(e) {
          // 중복 에러면 이름 변형 시도해서 업데이트
          if (e.message.includes('duplicate') || e.message.includes('23505')) {
            try {
              const retry = await api('GET', `songs?select=id,name&name=ilike.${encodeURIComponent('%'+name+'%')}`);
              if (retry && retry[0]) {
                await api('PATCH', `songs?id=eq.${retry[0].id}`, { count, status, updated_at: new Date().toISOString() }, true);
                log(`✓ 유사 이름 매칭 업데이트: ${retry[0].name} (${count}회)`, 'ok');
                updated++;
              }
            } catch(e2) {
              log(`✗ 매칭 실패: ${name}`, 'err');
              failed++;
            }
          } else {
            log(`✗ 추가 실패: ${name} — ${e.message}`, 'err');
            failed++;
          }
        }
      }
    }

    log('');
    log(`✅ 완료! 업데이트: ${updated}곡 / 신규 추가: ${added}곡 / 실패: ${failed}곡`, 'ok');
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    sum.innerHTML = `✅ 완료 — 업데이트 ${updated}곡 · 신규 추가 ${added}곡 · 실패 ${failed}곡`;
  } catch(e) {
    log(`✗ 오류: ${e.message}`, 'err');
  }
  btn.disabled = false;
  btn.textContent = '다시 실행';
}
</script>
</body>
</html>
